<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil — Expansão Territorial & Diplomacia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1208;font-family:'IBM Plex Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#0f0c06;padding:8px 16px;border-bottom:2px solid #b8860b;flex-shrink:0}
.hl h1{font-family:'Playfair Display',serif;font-size:1rem;color:#f5f0e8}
.hl h1 em{color:#b8860b}
.hl p{font-size:0.55rem;color:#7a6a52;margin-top:2px}
.layout{display:flex;flex:1;overflow:hidden;flex-direction:column}
#map{flex:1;background:#1a2a3a}
.timeline-container{background:#0f0c06;border-top:2px solid #b8860b;padding:8px 16px;flex-shrink:0}
.timeline-header{display:flex;justify-content:space-between;margin-bottom:8px}
.timeline-header h3{font-size:0.6rem;color:#b8860b}
.timeline-value{font-size:0.7rem;color:#f5f0e8;background:rgba(184,134,11,0.2);padding:2px 8px;border-radius:20px}
#timeline{height:4px;margin:10px 0}
.noUi-connect{background:#b8860b}
.noUi-handle{width:14px;height:14px;right:-7px;top:-5px;border-radius:50%;background:#f5f0e8;border:2px solid #b8860b;box-shadow:none}
.noUi-handle:before,.noUi-handle:after{display:none}
.timeline-labels{display:flex;justify-content:space-between;margin-top:4px}
.timeline-labels span{font-size:0.5rem;color:#7a6a52;cursor:pointer}
.legend-bar{background:#13100a;padding:4px 12px;display:flex;flex-wrap:wrap;gap:6px 12px;flex-shrink:0;max-height:50px;overflow-y:auto}
.leg-item{display:flex;align-items:center;gap:4px;font-size:0.45rem;color:#8a7a62;cursor:pointer}
.leg-sw{width:10px;height:10px;border-radius:2px}
.panel{position:fixed;bottom:130px;right:12px;width:280px;background:#faf7f2;border:1px solid #c8b89a;border-radius:6px;display:none;z-index:1000;max-height:50vh}
.panel.active{display:flex;flex-direction:column}
.p-header{padding:8px 12px;background:#1a1208;border-radius:6px 6px 0 0}
.p-tit{font-family:'Playfair Display',serif;font-size:0.8rem;font-weight:700;color:#f5f0e8}
.p-sub{font-size:0.55rem;color:#b8860b}
.p-close{float:right;background:transparent;border:none;color:#8a7a62;cursor:pointer}
.p-scroll{padding:8px;font-size:0.7rem;overflow-y:auto}
.ev-card{border:1px solid #c8b89a;margin-bottom:6px;background:#fff;border-radius:4px}
.ev-top{padding:6px 8px;cursor:pointer}
.ev-name{font-weight:700;font-size:0.7rem}
.ev-date{font-size:0.6rem;color:#7a6a52}
.ev-body{display:none;padding:6px 8px;border-top:1px solid #eee}
.ev-body.open{display:block}
.badge{display:inline-block;font-size:0.45rem;padding:2px 5px;border-radius:2px;margin-bottom:4px}
.bc{background:#fdecea;color:#b71c1c}
.bt{background:#fff8e1;color:#e65100}
.bd{background:#e3f0fb;color:#0d47a1}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
</head>
<body>
<header>
  <div class="hl">
    <h1>Brasil — <em>Expansão Territorial</em> &amp; Diplomacia</h1>
    <p>Arraste a linha do tempo → clique nos estados → veja a história</p>
  </div>
</header>

<div class="layout">
  <div id="map"></div>
  <div class="timeline-container">
    <div class="timeline-header">
      <h3>📜 EVOLUÇÃO TERRITORIAL — ARRASTE</h3>
      <div class="timeline-value" id="yearDisplay">1494</div>
    </div>
    <div id="timeline"></div>
    <div class="timeline-labels" id="timelineLabels"></div>
  </div>
  <div class="legend-bar" id="legendBar"></div>
</div>

<div class="panel" id="panel">
  <div class="p-header">
    <button class="p-close" onclick="closePanel()">✕</button>
    <div class="p-tit" id="panelTitle">Tratado</div>
    <div class="p-sub" id="panelSub"></div>
  </div>
  <div class="p-scroll" id="panelContent"></div>
</div>

<script>
// MAPA
const map = L.map('map').setView([-14, -55], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, attribution: '&copy; OSM & CartoDB'
}).addTo(map);

// TRATADOS
const tratados = [
  { year:1494, name:"Tratado de Tordesilhas", sub:"Portugal vs Espanha", color:"#c8685a", region:"original",
    desc:"7 de junho de 1494. Divisão do mundo a 370 léguas de Cabo Verde.", leaders:"🇵🇹 D. João II | 🇪🇸 Fernando II e Isabel I", consequence:"Portugal reivindicou o Brasil.", legacy:"Fundamento do colonialismo português." },
  { year:1750, name:"Tratado de Madri", sub:"Uti possidetis", color:"#d4956a", region:"espanha",
    desc:"13 de janeiro de 1750. Substituiu Tordesilhas.", leaders:"🇵🇹 D. João V | 🇪🇸 Fernando VI", consequence:"Brasil incorporou milhões de km².", legacy:"Maior ganho territorial da história." },
  { year:1777, name:"Santo Ildefonso", sub:"Ajuste sul", color:"#e8a850", region:"espanha",
    desc:"1º de outubro de 1777. Ajuste de fronteiras.", leaders:"🇵🇹 D. Maria I | 🇪🇸 Carlos III", consequence:"Portugal manteve o Rio Grande do Sul.", legacy:"Última demarcação colonial." },
  { year:1801, name:"Missões Orientais", sub:"Noroeste do RS", color:"#90b878", region:"argentina1801",
    desc:"Tomada dos Sete Povos das Missões.", leaders:"🇧🇷 Borges do Canto", consequence:"Brasil incorporou o noroeste gaúcho.", legacy:"Definiu a fronteira do RS." },
  { year:1816, name:"Cisplatina", sub:"Banda Oriental", color:"#58c888", region:"argentina1816",
    desc:"Invasão da Banda Oriental (atual Uruguai).", leaders:"🇧🇷 D. João VI | 🇺🇾 José Artigas", consequence:"Cisplatina tornou-se Uruguai (1828).", legacy:"Estado-tampão britânico." },
  { year:1867, name:"Tratado de Ayacucho", sub:"Fronteira Bolívia", color:"#78b468", region:"bolivia1860",
    desc:"Fronteira no paralelo 10°20' e rio Madeira.", leaders:"🇧🇷 D. Pedro II | 🇧🇴 Mariano Melgarejo", consequence:"Acre ficou em zona ambígua.", legacy:"Semente da crise de 1903." },
  { year:1870, name:"Guerra do Paraguai", sub:"Territórios anexados", color:"#8ab4d8", region:"paraguai",
    desc:"Paraguai perdeu 140.000 km².", leaders:"🇧🇷 D. Pedro II | 🇵🇾 Solano López", consequence:"Brasil consolidou-se como potência.", legacy:"Acelerou o fim do Império." },
  { year:1900, name:"Questão do Amapá", sub:"Arbitragem de Berna", color:"#78c8d8", region:"franca",
    desc:"Suíça decidiu a favor do Brasil.", leaders:"🇧🇷 Prudente de Morais | 🇫🇷 Félix Faure", consequence:"Brasil garantiu o Amapá.", legacy:"Vitória de Rio Branco." },
  { year:1903, name:"Tratado de Petrópolis", sub:"Anexação do Acre", color:"#b888c8", region:"acre",
    desc:"Brasil anexou 191.000 km² da Bolívia.", leaders:"🇧🇷 Rio Branco | 🇧🇴 José Manuel Pando", consequence:"Acre foi incorporado.", legacy:"Símbolo da diplomacia de Rio Branco." }
];

const regionColors = {
  'original': '#c8685a', 'espanha': '#d4956a', 'argentina1801': '#90b878',
  'argentina1816': '#58c888', 'bolivia1860': '#78b468', 'acre': '#b888c8',
  'paraguai': '#8ab4d8', 'franca': '#78c8d8'
};

// Mapeamento dos estados para região base
let estadoRegiao = {
  'AC':'original','AL':'original','AP':'original','AM':'original','BA':'original',
  'CE':'original','DF':'original','ES':'original','GO':'original','MA':'original',
  'MG':'original','MS':'original','MT':'original','PA':'original','PB':'original',
  'PE':'original','PI':'original','PR':'original','RJ':'original','RN':'original',
  'RO':'original','RR':'original','RS':'original','SC':'original','SE':'original',
  'SP':'original','TO':'original'
};

function atualizarMapaPorAno(ano) {
  let novasRegioes = {...estadoRegiao};
  for (let t of tratados) {
    if (t.year <= ano) {
      if (t.region === 'espanha') ['MG','GO','DF','TO','MT'].forEach(s => novasRegioes[s] = 'espanha');
      if (t.region === 'argentina1801') novasRegioes['RS'] = 'argentina1801';
      if (t.region === 'argentina1816') novasRegioes['SC'] = 'argentina1816';
      if (t.region === 'bolivia1860') novasRegioes['RO'] = 'bolivia1860';
      if (t.region === 'acre') novasRegioes['AC'] = 'acre';
      if (t.region === 'paraguai') novasRegioes['MS'] = 'paraguai';
      if (t.region === 'franca') novasRegioes['AP'] = 'franca';
    }
  }
  if (camadaEstados) {
    camadaEstados.eachLayer(layer => {
      let uf = layer.feature?.properties?.sigla;
      if (uf && novasRegioes[uf]) {
        layer.setStyle({ fillColor: regionColors[novasRegioes[uf]] });
      }
    });
  }
  document.getElementById('yearDisplay').innerHTML = ano;
}

// GEOJSON EMBUTIDO (simplificado com os principais estados)
const geojsonEstados = {
  "type":"FeatureCollection",
  "features":[
    {"type":"Feature","properties":{"sigla":"AC","name":"Acre"},"geometry":{"type":"Polygon","coordinates":[[[-73.5,-7.5],[-70.5,-7.5],[-69.5,-9],[-70.5,-11],[-73,-11],[-73.5,-7.5]]]}},
    {"type":"Feature","properties":{"sigla":"AM","name":"Amazonas"},"geometry":{"type":"Polygon","coordinates":[[[-70.5,-6],[-65,-6],[-63,-4],[-60,-2],[-60,-5],[-62,-8],[-65,-8],[-68,-8],[-70.5,-7],[-70.5,-6]]]}},
    {"type":"Feature","properties":{"sigla":"AP","name":"Amapá"},"geometry":{"type":"Polygon","coordinates":[[[-54,-2],[-51,-1],[-51,-4],[-54,-4],[-54,-2]]]}},
    {"type":"Feature","properties":{"sigla":"PA","name":"Pará"},"geometry":{"type":"Polygon","coordinates":[[[-56,-1],[-51,-1],[-48,-2],[-48,-6],[-52,-8],[-56,-6],[-56,-1]]]}},
    {"type":"Feature","properties":{"sigla":"RO","name":"Rondônia"},"geometry":{"type":"Polygon","coordinates":[[[-64,-10],[-61,-10],[-61,-13],[-64,-13],[-64,-10]]]}},
    {"type":"Feature","properties":{"sigla":"RR","name":"Roraima"},"geometry":{"type":"Polygon","coordinates":[[[-61,2],[-59,2],[-59,-2],[-62,-2],[-61,2]]]}},
    {"type":"Feature","properties":{"sigla":"TO","name":"Tocantins"},"geometry":{"type":"Polygon","coordinates":[[[-50,-6],[-47,-6],[-46,-9],[-48,-11],[-50,-10],[-50,-6]]]}},
    {"type":"Feature","properties":{"sigla":"AL","name":"Alagoas"},"geometry":{"type":"Polygon","coordinates":[[[-37,-9],[-35,-9],[-35.5,-10],[-37,-10],[-37,-9]]]}},
    {"type":"Feature","properties":{"sigla":"BA","name":"Bahia"},"geometry":{"type":"Polygon","coordinates":[[[-46,-9],[-38,-9],[-38,-18],[-46,-18],[-46,-9]]]}},
    {"type":"Feature","properties":{"sigla":"CE","name":"Ceará"},"geometry":{"type":"Polygon","coordinates":[[[-41,-3],[-37,-3],[-37,-7],[-41,-7],[-41,-3]]]}},
    {"type":"Feature","properties":{"sigla":"MA","name":"Maranhão"},"geometry":{"type":"Polygon","coordinates":[[[-48,-2],[-43,-2],[-43,-6],[-47,-7],[-48,-2]]]}},
    {"type":"Feature","properties":{"sigla":"PB","name":"Paraíba"},"geometry":{"type":"Polygon","coordinates":[[[-38,-6],[-35,-6],[-35,-8],[-38,-8],[-38,-6]]]}},
    {"type":"Feature","properties":{"sigla":"PE","name":"Pernambuco"},"geometry":{"type":"Polygon","coordinates":[[[-40,-7],[-35,-7],[-35,-9],[-40,-9],[-40,-7]]]}},
    {"type":"Feature","properties":{"sigla":"PI","name":"Piauí"},"geometry":{"type":"Polygon","coordinates":[[[-45,-3],[-41,-3],[-41,-10],[-45,-10],[-45,-3]]]}},
    {"type":"Feature","properties":{"sigla":"RN","name":"Rio Grande do Norte"},"geometry":{"type":"Polygon","coordinates":[[[-38,-5],[-35,-5],[-35,-6],[-38,-6],[-38,-5]]]}},
    {"type":"Feature","properties":{"sigla":"SE","name":"Sergipe"},"geometry":{"type":"Polygon","coordinates":[[[-38,-10],[-36,-10],[-36.5,-11],[-38,-11],[-38,-10]]]}},
    {"type":"Feature","properties":{"sigla":"GO","name":"Goiás"},"geometry":{"type":"Polygon","coordinates":[[[-52,-13],[-46,-13],[-46,-19],[-52,-19],[-52,-13]]]}},
    {"type":"Feature","properties":{"sigla":"MS","name":"Mato Grosso do Sul"},"geometry":{"type":"Polygon","coordinates":[[[-57,-19],[-51,-19],[-51,-23],[-57,-23],[-57,-19]]]}},
    {"type":"Feature","properties":{"sigla":"MT","name":"Mato Grosso"},"geometry":{"type":"Polygon","coordinates":[[[-62,-8],[-55,-8],[-55,-16],[-62,-16],[-62,-8]]]}},
    {"type":"Feature","properties":{"sigla":"DF","name":"Distrito Federal"},"geometry":{"type":"Polygon","coordinates":[[[-47.9,-15.7],[-47.5,-15.7],[-47.5,-16],[-47.9,-16],[-47.9,-15.7]]]}},
    {"type":"Feature","properties":{"sigla":"ES","name":"Espírito Santo"},"geometry":{"type":"Polygon","coordinates":[[[-41,-18],[-39,-18],[-39,-21],[-41,-21],[-41,-18]]]}},
    {"type":"Feature","properties":{"sigla":"MG","name":"Minas Gerais"},"geometry":{"type":"Polygon","coordinates":[[[-51,-14],[-44,-14],[-44,-22],[-51,-22],[-51,-14]]]}},
    {"type":"Feature","properties":{"sigla":"RJ","name":"Rio de Janeiro"},"geometry":{"type":"Polygon","coordinates":[[[-44.5,-22],[-41,-22],[-41,-23.5],[-44.5,-23.5],[-44.5,-22]]]}},
    {"type":"Feature","properties":{"sigla":"SP","name":"São Paulo"},"geometry":{"type":"Polygon","coordinates":[[[-52,-20],[-44,-20],[-44,-24],[-52,-24],[-52,-20]]]}},
    {"type":"Feature","properties":{"sigla":"PR","name":"Paraná"},"geometry":{"type":"Polygon","coordinates":[[[-54,-23],[-48,-23],[-48,-26],[-54,-26],[-54,-23]]]}},
    {"type":"Feature","properties":{"sigla":"SC","name":"Santa Catarina"},"geometry":{"type":"Polygon","coordinates":[[[-53,-26],[-48,-26],[-48,-29],[-53,-29],[-53,-26]]]}},
    {"type":"Feature","properties":{"sigla":"RS","name":"Rio Grande do Sul"},"geometry":{"type":"Polygon","coordinates":[[[-57,-27],[-50,-27],[-50,-33],[-57,-33],[-57,-27]]]}}
  ]
};

let camadaEstados = null;

camadaEstados = L.geoJSON(geojsonEstados, {
  style: function(feature) {
    let uf = feature.properties.sigla;
    let corBase = regionColors[estadoRegiao[uf] || 'original'];
    return { fillColor: corBase, fillOpacity: 0.7, color: '#ffffff', weight: 1, opacity: 0.9 };
  },
  onEachFeature: function(feature, layer) {
    let nome = feature.properties.name;
    let uf = feature.properties.sigla;
    layer.bindTooltip(nome);
    layer.on('click', () => {
      let tratadoAssociado = tratados.slice().reverse().find(t => {
        if (t.region === 'espanha') return ['MG','GO','DF','TO','MT'].includes(uf);
        if (t.region === 'argentina1801') return uf === 'RS';
        if (t.region === 'argentina1816') return uf === 'SC';
        if (t.region === 'bolivia1860') return uf === 'RO';
        if (t.region === 'acre') return uf === 'AC';
        if (t.region === 'paraguai') return uf === 'MS';
        if (t.region === 'franca') return uf === 'AP';
        return false;
      }) || tratados[0];
      abrirPainel(tratadoAssociado, nome);
    });
    layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.9, weight: 2 }));
    layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.7, weight: 1 }));
  }
}).addTo(map);

map.fitBounds([[-33, -73], [5, -34]]);
atualizarMapaPorAno(1494);

// TIMELINE
const anos = tratados.map(t => t.year);
const timeline = document.getElementById('timeline');
noUiSlider.create(timeline, { start: [1494], connect: [true, false], step: 1, range: { min: 1494, max: 1903 } });
timeline.noUiSlider.on('update', (val) => atualizarMapaPorAno(Math.round(val[0])));

const labelDiv = document.getElementById('timelineLabels');
anos.forEach(a => { let sp = document.createElement('span'); sp.textContent = a; sp.onclick = () => timeline.noUiSlider.set(a); labelDiv.appendChild(sp); });

// LEGENDA
const legendaDiv = document.getElementById('legendBar');
for (let t of tratados) {
  let el = document.createElement('div');
  el.className = 'leg-item';
  el.innerHTML = `<div class="leg-sw" style="background:${t.color}"></div>${t.name}`;
  el.onclick = () => { timeline.noUiSlider.set(t.year); abrirPainel(t); };
  legendaDiv.appendChild(el);
}

// PAINEL
function abrirPainel(t, estadoNome = '') {
  document.getElementById('panelTitle').innerHTML = `📜 ${t.name}`;
  document.getElementById('panelSub').innerHTML = t.sub;
  document.getElementById('panelContent').innerHTML = `
    <div class="ev-card"><div class="ev-top" onclick="this.nextElementSibling.classList.toggle('open')">
      <span class="badge ${t.year>=1900?'bc':(t.year>=1800?'bt':'bd')}">${t.year}</span>
      <div class="ev-name">${t.name}</div>
      <div class="ev-date">📅 ${t.year}</div>
    </div><div class="ev-body">
      <div><strong>📝 Descrição</strong><br>${t.desc}</div><br>
      <div><strong>👑 Líderes</strong><br>${t.leaders}</div><br>
      <div><strong>⚡ Consequências</strong><br>${t.consequence}</div><br>
      <div><strong>🏛️ Legado</strong><br>${t.legacy}</div>
      ${estadoNome ? `<br><div><strong>📍 ${estadoNome}</strong> foi incorporado por este tratado.</div>` : ''}
    </div></div>`;
  document.getElementById('panel').classList.add('active');
}

function closePanel() { document.getElementById('panel').classList.remove('active'); }

// Linha de Tordesilhas
L.polyline([[5,-46],[0,-46],[-5,-46],[-10,-46],[-15,-46],[-20,-46],[-25,-46],[-30,-46],[-33,-46]],
  { color: '#b8860b', weight: 3, dashArray: '8,6', opacity: 0.7 }).addTo(map);
</script>
</body>
</html>
