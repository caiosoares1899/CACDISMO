<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil — Expansão Territorial & Diplomacia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=IBM+Plex+Mono:wght@300;400;600&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--border:#30363d;--gold:#d4a843;--gold-dim:rgba(212,168,67,0.13);--text:#e6edf3;--muted:#7d8590;--panel:#13191f}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:"IBM Plex Mono",monospace;color:var(--text);display:flex;flex-direction:column}
header{background:#090d12;border-bottom:2px solid var(--gold);padding:8px 20px;flex-shrink:0}
.logo h1{font-family:"Playfair Display",serif;font-size:clamp(.8rem,1.4vw,1rem);font-weight:900;color:var(--text)}
.logo h1 em{color:var(--gold);font-style:normal}
.logo-sub{font-size:.45rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.body-wrap{flex:1;display:flex;overflow:hidden;min-height:0}

/* MAPA */
.map-wrap{flex:1;overflow:auto;background:#0a1520;display:flex;align-items:center;justify-content:center;padding:8px}
.map-img{height:calc(100vh - 100px);width:auto;display:block}

/* LEGENDA COMPACTA - EM GRADE */
.legend-panel{width:280px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column}
.legend-header{background:var(--bg);padding:8px 12px;border-bottom:1px solid var(--gold);text-align:center}
.legend-header h2{font-family:"Playfair Display",serif;font-size:.7rem;color:var(--gold);letter-spacing:1px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;overflow-y:auto;flex:1}
.legend-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .15s}
.legend-item:hover{background:var(--gold-dim);border-color:var(--gold)}
.legend-item.active{background:var(--gold-dim);border-color:var(--gold);border-left-width:3px}
.legend-color{width:16px;height:16px;border-radius:2px;flex-shrink:0}
.legend-name{font-size:.5rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-year{font-size:.4rem;color:var(--gold);margin-top:1px}

/* PAINEL DE INFORMAÇÕES */
.side-panel{width:340px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:20px;text-align:center}
.sp-empty .ico{font-size:1.8rem;opacity:.12}
.sp-empty h3{font-family:"Playfair Display",serif;font-size:.85rem;font-weight:400}
.sp-empty p{font-size:.6rem;line-height:1.5}
.sp-content{display:none;flex-direction:column;height:100%;overflow:hidden}
.sp-content.on{display:flex}
.sp-hdr{background:var(--bg);padding:10px 12px 8px;border-bottom:1px solid var(--border);position:relative;flex-shrink:0}
.sp-yr{font-size:.5rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
.sp-nm{font-family:"Playfair Display",serif;font-size:.85rem;font-weight:700;color:var(--text);line-height:1.2}
.sp-sb{font-size:.5rem;color:var(--muted);margin-top:2px}
.sp-cls{position:absolute;top:8px;right:10px;background:transparent;border:1px solid var(--border);color:var(--muted);width:20px;height:20px;cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center}
.sp-cls:hover{border-color:var(--gold);color:var(--gold)}
.sp-scroll{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin}
.sp-scroll::-webkit-scrollbar{width:3px}
.sp-scroll::-webkit-scrollbar-thumb{background:var(--border)}
.irow{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.ilbl{font-size:.45rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.ival{font-family:"Crimson Pro",serif;font-size:.75rem;line-height:1.5;color:#c9d1d9}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:3px}
.lbox{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 6px}
.lflag{font-size:.7rem;display:block;margin-bottom:1px}
.lrole{font-size:.4rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.lname{font-size:.6rem;color:var(--text);margin-top:1px;line-height:1.2}
.tbadge{display:inline-block;font-size:.45rem;padding:2px 6px;letter-spacing:.07em;text-transform:uppercase;border:1px solid;margin-bottom:8px}
.tb-war{background:rgba(183,28,28,.15);color:#ef5350;border-color:rgba(239,83,80,.4)}
.tb-treaty{background:rgba(230,145,0,.12);color:#ffb74d;border-color:rgba(255,183,77,.4)}
.tb-arb{background:rgba(106,27,154,.12);color:#ba68c8;border-color:rgba(186,104,200,.4)}
.bottom-bar{background:#090d12;border-top:1px solid var(--border);padding:5px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bb-hint{font-size:.45rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.pills{display:flex;gap:3px;flex-wrap:wrap}
.pill{font-size:.45rem;padding:2px 6px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover,.pill.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <h1>Brasil &mdash; <em>Expansão Territorial</em> &amp; Diplomacia na América do Sul</h1>
    <div class="logo-sub">Sécs. XV&ndash;XX &middot; Clique nos itens coloridos</div>
  </div>
</header>
<div class="body-wrap">

  <!-- MAPA -->
  <div class="map-wrap">
    <img src="mapa_brasil.png" alt="Mapa do Brasil" class="map-img" id="mapImage">
  </div>

  <!-- LEGENDA COMPACTA (GRADE 2 COLUNAS) -->
  <div class="legend-panel">
    <div class="legend-header">
      <h2>🗺️ CLIQUE NAS REGIÕES</h2>
    </div>
    <div class="legend-grid" id="legendGrid"></div>
  </div>

  <!-- PAINEL DE INFORMAÇÕES -->
  <div class="side-panel">
    <div class="sp-empty" id="spEmpty">
      <div class="ico">📜</div>
      <h3>Selecione uma Região</h3>
      <p>Clique em qualquer item colorido da legenda</p>
    </div>
    <div class="sp-content" id="spContent">
      <div class="sp-hdr">
        <div class="sp-yr" id="spYr"></div>
        <div class="sp-nm" id="spNm"></div>
        <div class="sp-sb" id="spSb"></div>
        <button class="sp-cls" onclick="closePanel()">✕</button>
      </div>
      <div class="sp-scroll" id="spScroll"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <span class="bb-hint">Acesso rápido →</span>
  <div class="pills" id="pills"></div>
</div>

<script>
const REGIONS = [
  { id: "original", name: "Território Original", year: "1494", sub: "A leste de Tordesilhas", color: "#c87060", type: "tb-treaty", tl: "Tratado de Tordesilhas",
    leaders: [{f:"🇵🇹",r:"Rei de Portugal",n:"D. João II"},{f:"🇪🇸",r:"Reis de Castela",n:"Fernando II e Isabel I"}],
    re: "Divisão papal do mundo a 370 léguas a oeste de Cabo Verde. Apenas a estreita faixa costeira nordeste/leste do Brasil ficava do lado português.",
    mo: "Resolver a disputa sobre as terras descobertas por Colombo (1492).",
    co: "Portugal reivindicou o Brasil como possessão legítima. A expansão bandeirante ignorou a linha.",
    le: "Nunca respeitada, serviu de base jurídica colonial. O Tratado de Madri (1750) a substituiu.",
    rp: "Sem Tordesilhas, o Brasil seria 60% menor. O uti possidetis moldou o direito internacional."
  },
  { id: "espanha1494", name: "Cedido pela Espanha", year: "1494-1750", sub: "Entre Tordesilhas e fronteira real", color: "#d4a843", type: "tb-treaty", tl: "Expansão Bandeirante",
    leaders: [{f:"🇧🇷",r:"Bandeirantes",n:"Borba Gato, Anhanguera"},{f:"🇪🇸",r:"Vice-reinado do Peru",n:"Administradores espanhóis"}],
    re: "Bandeiras paulistas avançaram para o interior ignorando Tordesilhas. Uti possidetis foi consagrado no Tratado de Madri (1750).",
    mo: "Busca por escravos indígenas, ouro e pedras preciosas.",
    co: "Criou o uti possidetis como realidade geopolítica. Deu ao Brasil sua forma continental.",
    le: "Brasil conquistou ~4 milhões de km² além de Tordesilhas.",
    rp: "Alexandre de Gusmão usou o uti possidetis no Tratado de Madri."
  },
  { id: "peru1600", name: "Cedido Peru/Espanha", year: "1637-1750", sub: "Expansão no Amazonas", color: "#e8a850", type: "tb-treaty", tl: "Expansão / Tratado",
    leaders: [{f:"🇧🇷",r:"Explorador",n:"Pedro Teixeira"},{f:"🇪🇸",r:"Vice-reinado do Peru",n:"Filipe IV"}],
    re: "Pedro Teixeira navegou o Amazonas até Quito (1637-38). Tratado de Madri legalizou essa posse.",
    mo: "Afirmar posse portuguesa do Amazonas durante a União Ibérica.",
    co: "Criou precedente de controle lusitano sobre o Amazonas.",
    le: "Primeira demarcação efetiva do Amazonas como território português.",
    rp: "Afastou Peru/Espanha da bacia amazônica central."
  },
  { id: "peru1650", name: "Cedido Peru/Espanha", year: "1650-1750", sub: "Amazônia e interior", color: "#d8c858", type: "tb-treaty", tl: "Expansão / Tratado",
    leaders: [{f:"🇧🇷",r:"Governadores",n:"Alexandre de Gusmão"},{f:"🇪🇸",r:"Vice-reinado do Peru",n:"Administradores"}],
    re: "Maior região incorporada além de Tordesilhas. Expansão bandeirante legitimada pelo Tratado de Madri.",
    mo: "Uti possidetis: missões e postos militares justificavam a posse.",
    co: "Espanha reconheceu a posse lusitana sobre o Amazonas central.",
    le: "Definiu o coração do Brasil continental.",
    rp: "Uti possidetis tornou-se pedra angular do direito internacional."
  },
  { id: "colombia1750", name: "Cedido Colômbia/Esp", year: "1750/1907", sub: "Alto Rio Negro", color: "#88c855", type: "tb-treaty", tl: "Tratado de Fronteira",
    leaders: [{f:"🇧🇷",r:"Rei de Portugal",n:"D. João V"},{f:"🇨🇴",r:"Espanha/Colômbia",n:"Fernando VI"}],
    re: "Tratado de Madri cedeu o Alto Rio Negro ao Brasil. Tratado de 1907 demarcou a fronteira.",
    mo: "Uti possidetis: missões portuguesas na região.",
    co: "Colômbia perdeu acesso ao Alto Amazonas.",
    le: "Definiu o corredor noroeste com Colômbia e Venezuela.",
    rp: "Cimentou relação bilateral positiva Brasil-Colômbia."
  },
  { id: "colombia1860", name: "Cedido Colômbia", year: "1853/1907", sub: "Região do Javari", color: "#58a838", type: "tb-treaty", tl: "Cooperação",
    leaders: [{f:"🇧🇷",r:"Imperador",n:"D. Pedro II"},{f:"🇨🇴",r:"Presidente",n:"José Hilario López"}],
    re: "Negociação de acesso colombiano ao Amazonas em troca de reconhecimento das fronteiras.",
    mo: "Colômbia precisava de saída fluvial ao Atlântico.",
    co: "Colômbia obteve direitos de navegação; Brasil consolidou fronteira.",
    le: "Base para cooperação amazônica (Tratado de Cooperação Amazônica, 1978).",
    rp: "Estabeleceu controle brasileiro incontestável da Amazônia."
  },
  { id: "bolivia1860", name: "Cedido Bolívia", year: "1867", sub: "Alto Madeira / Guaporé", color: "#78b468", type: "tb-treaty", tl: "Tratado de Ayacucho",
    leaders: [{f:"🇧🇷",r:"Imperador",n:"D. Pedro II"},{f:"🇧🇴",r:"Presidente",n:"Mariano Melgarejo"}],
    re: "Fronteira fixada no paralelo 10°20' S até o rio Madeira. Bolívia cedeu território por direitos de navegação.",
    mo: "Conflitos de garimpeiros e seringueiros.",
    co: "Fronteira parcial. Acre ficou em zona ambígua.",
    le: "Imprecisão culminou na Revolução Acreana.",
    rp: "Exemplo clássico de acordos vagos que criam conflitos."
  },
  { id: "bolivia1903", name: "Cedido Bolívia (Acre)", year: "1899-1903", sub: "Tratado de Petrópolis", color: "#b888c8", type: "tb-war", tl: "Revolução Acreana",
    leaders: [{f:"🇧🇷",r:"Presidente",n:"Rodrigues Alves"},{f:"🇧🇴",r:"Presidente",n:"José Manuel Pando"}],
    re: "Seringueiros rebelaram-se e proclamaram a República do Acre. Tratado de Petrópolis cedeu 191.000 km² ao Brasil.",
    mo: "~60.000 brasileiros viviam no Acre produzindo borracha.",
    co: "Brasil obteve o Acre. Bolívia recebeu indenização.",
    le: "Símbolo máximo da diplomacia Rio Branco.",
    rp: "Evo Morales invocou esse histórico ao nacionalizar o gás em 2006."
  },
  { id: "paraguai1870", name: "Cedido Paraguai", year: "1864-1870", sub: "Guerra da Tríplice Aliança", color: "#7898c0", type: "tb-war", tl: "Guerra",
    leaders: [{f:"🇧🇷",r:"Imperador",n:"D. Pedro II"},{f:"🇵🇾",r:"Ditador",n:"Francisco Solano López"}],
    re: "Maior guerra da América do Sul. Paraguai perdeu 140.000 km² e 70% da população masculina.",
    mo: "Solano López buscava hegemonia regional.",
    co: "Brasil obteve região entre rios Apa e Branco.",
    le: "Guerra mais mortífera da história americana.",
    rp: "Acelerou a crise do Império e contribuiu para a Proclamação da República."
  },
  { id: "argentina1801", name: "Cedido Argentina/Esp", year: "1801", sub: "Missões Orientais - RS", color: "#90b878", type: "tb-war", tl: "Guerra das Laranjas",
    leaders: [{f:"🇧🇷",r:"Capitania RS",n:"Borges do Canto"},{f:"🇪🇸",r:"Vice-reinado do Prata",n:"Joaquín del Pino"}],
    re: "Borges do Canto tomou os Sete Povos das Missões em apenas 10 dias.",
    mo: "Guerra das Laranjas criou janela geopolítica.",
    co: "Brasil incorporou o noroeste gaúcho.",
    le: "Definiu o extremo NW do Rio Grande do Sul.",
    rp: "Questão de Palmas/Misiones (1895) foi primeira vitória do Barão do Rio Branco."
  },
  { id: "argentina1816", name: "Cedido Argentina+Uruguai", year: "1816-1830", sub: "Cisplatina", color: "#50c880", type: "tb-war", tl: "Guerra Cisplatina",
    leaders: [{f:"🇧🇷",r:"Imperador",n:"D. Pedro I"},{f:"🇺🇾",r:"Revolucionários",n:"Artigas / Lavalleja"}],
    re: "Portugal invadiu a Banda Oriental (1816). Guerra Cisplatina (1825-28) criou o Uruguai.",
    mo: "Portugal queria o estuário do Prata.",
    co: "Brasil perdeu a Cisplatina (1828). Uruguai independente.",
    le: "Uruguai nasceu como Estado-tampão britânico.",
    rp: "Perda contribuiu para abdicação de D. Pedro I."
  },
  { id: "franca1816", name: "Cedido França", year: "1809/1900", sub: "Amapá / Guiana", color: "#58c0d8", type: "tb-arb", tl: "Arbitragem de Berna",
    leaders: [{f:"🇧🇷",r:"Príncipe Regente",n:"D. João VI"},{f:"🇫🇷",r:"Imperador",n:"Napoleão Bonaparte"}],
    re: "D. João VI tomou a Guiana Francesa (1809). Conselho Federal Suíço decidiu pelo Brasil em 1900.",
    mo: "Retaliação napoleônica e interesse estratégico.",
    co: "Brasil garantiu ~260.000 km² do Amapá.",
    le: "Primeira grande vitória diplomática do Barão do Rio Branco.",
    rp: "Lançou Rio Branco à cena nacional e abriu seu ciclo de consolidação das fronteiras."
  }
];

// Construir legenda compacta em grade
const legendGrid = document.getElementById('legendGrid');
const pillsDiv = document.getElementById('pills');
let activeId = null;

REGIONS.forEach(region => {
  // Item da legenda compacto
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.id = region.id;
  item.onclick = () => openRegion(region.id);
  item.innerHTML = `
    <div class="legend-color" style="background: ${region.color}"></div>
    <div style="flex:1; min-width:0">
      <div class="legend-name">${region.name}</div>
      <div class="legend-year">${region.year}</div>
    </div>
  `;
  legendGrid.appendChild(item);
  
  // Pill de acesso rápido
  const pill = document.createElement('div');
  pill.className = 'pill';
  pill.dataset.id = region.id;
  pill.textContent = region.year.slice(0,4) + ' ' + region.name.split(' ')[0];
  pill.onclick = () => openRegion(region.id);
  pillsDiv.appendChild(pill);
});

function openRegion(id) {
  const region = REGIONS.find(r => r.id === id);
  if (!region) return;
  
  // Remove destaque anterior
  document.querySelectorAll('.legend-item').forEach(item => item.classList.remove('active'));
  document.querySelectorAll('.pill').forEach(pill => pill.classList.remove('on'));
  
  // Destaque atual
  const currentItem = document.querySelector(`.legend-item[data-id="${id}"]`);
  const currentPill = document.querySelector(`.pill[data-id="${id}"]`);
  if (currentItem) currentItem.classList.add('active');
  if (currentPill) currentPill.classList.add('on');
  
  activeId = id;
  
  // Preenche o painel
  document.getElementById('spYr').textContent = region.year + ' · ' + region.tl;
  document.getElementById('spNm').textContent = region.name;
  document.getElementById('spSb').textContent = region.sub;
  
  const leadersHtml = region.leaders.map(l => `
    <div class="lbox">
      <span class="lflag">${l.f}</span>
      <div class="lrole">${l.r}</div>
      <div class="lname">${l.n}</div>
    </div>
  `).join('');
  
  document.getElementById('spScroll').innerHTML = `
    <span class="tbadge ${region.type}">${region.tl}</span>
    <div class="irow"><div class="ilbl">👑 Líderes</div><div class="lgrid">${leadersHtml}</div></div>
    <div class="irow"><div class="ilbl">📖 Resumo</div><div class="ival">${region.re}</div></div>
    <div class="irow"><div class="ilbl">🎯 Motivação</div><div class="ival">${region.mo}</div></div>
    <div class="irow"><div class="ilbl">⚡ Consequências</div><div class="ival">${region.co}</div></div>
    <div class="irow"><div class="ilbl">🏛️ Legado</div><div class="ival">${region.le}</div></div>
    <div class="irow"><div class="ilbl">🌎 Repercussão Externa</div><div class="ival">${region.rp}</div></div>
  `;
  
  document.getElementById('spEmpty').style.display = 'none';
  document.getElementById('spContent').className = 'sp-content on';
  document.getElementById('spScroll').scrollTop = 0;
}

function closePanel() {
  if (activeId) {
    document.querySelectorAll('.legend-item').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.pill').forEach(pill => pill.classList.remove('on'));
    activeId = null;
  }
  document.getElementById('spEmpty').style.display = 'flex';
  document.getElementById('spContent').className = 'sp-content';
}
</script>
</body>
</html>
